<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}XP Interface{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <a href="{{ url_for('main.index') }}" class="brand">XP Interface</a>
        <nav>
            <a href="{{ url_for('main.pair') }}">Pair Programming</a>
            <a href="{{ url_for('main.feedback') }}">Client Feedback</a>
        </nav>
    </header>
    <main>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">{% for m in messages %}<p>{{ m }}</p>{% endfor %}</div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
